name: link-check

on:
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly Monday 06:00 UTC — rolling link-rot report
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: "--no-progress --max-retries 2 --timeout 30 --accept 200,206,429 './**/*.md'"
          # Advisory: link rot (and flaky timeouts on external sibling sites) never blocks a merge.
          # The weekly scheduled run opens a rolling "Link rot report" issue instead.
          fail: false
      - name: Rolling link-rot issue (scheduled only)
        if: github.event_name == 'schedule' && steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Link rot report"
          content-filepath: ./lychee/out.md
          labels: report
