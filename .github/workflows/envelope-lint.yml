name: envelope-lint

# Validates that every example atom conforms to the shared RAK OS envelope + its kind rules
# (SPEC.md §3.1) — proves RAK (content) and POXI/FOP (market) speak one format.
on: [push, pull_request]

permissions:
  contents: read

jobs:
  envelope-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/check-envelope.mjs
