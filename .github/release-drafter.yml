name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "🚀 Features"
    labels: [feature, enhancement]
  - title: "🐛 Fixes"
    labels: [bug, fix]
  - title: "📜 Spec & profiles"
    labels: [spec, rfc]
  - title: "🧰 Skills & tools"
    labels: [skills]
  - title: "🏛️ Governance & community"
    labels: [governance, community]
  - title: "📚 Docs"
    labels: [documentation, docs]
  - title: "🔧 Maintenance"
    labels: [chore, ci, dependencies]
change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
version-resolver:
  major:
    labels: [major, breaking]
  minor:
    labels: [minor, feature]
  patch:
    labels: [patch, fix, bug, chore]
  default: patch
template: |
  ## What's changed

  $CHANGES

  ## The Realm

  New contributors are credited in [HALL_OF_FAME.md](./HALL_OF_FAME.md). Thank you 👑
